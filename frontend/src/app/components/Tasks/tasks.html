<div class="page-layout">

    <main class="task-list">
        <aside class="sidebar">
           <h2 class="display">Welcome back,</h2> 
            <h2 class="sidebar-username display">{{ username }}</h2>
            <button class="btn-primary" (click)="logout()">Logout</button>
          </aside>
      <h2 class="display">My Tasks</h2>
  
      <div class=" body" *ngFor="let task of tasks()">
        <input
          type="checkbox"
          [checked]="task.completed"
          (change)="toggleCompleted(task)"
        />
  
        <span [class.completed]="task.completed">{{ task.title }}</span>
  
        <div class="task-actions">
          <button class="icon-btn" (click)="startEdit(task)" aria-label="Edit task">✎</button>
          <button class="icon-btn" (click)="deleteTask(task)" aria-label="Delete task">🗑</button>
        </div>
      </div>
    </main>
  
    <aside>
      <h2 class="display">{{ editingTaskId ? 'Edit Task' : 'Create New Task' }}</h2>
  
      <form [formGroup]="createForm" (ngSubmit)="createTask()">
        <label class=" body" for="date">Date</label>
        <input id="date" type="date" formControlName="date"  />
  
        <label class=" body" for="title">Task</label>
        <input id="title" type="text" formControlName="title"  placeholder="Enter a task" />
  
        <button type="submit" class="btn-primary body">
          {{ editingTaskId ? 'Save Task' : 'Create Task' }}
        </button>
  
        <button *ngIf="editingTaskId" type="button" class="btn-primary body" (click)="cancelEdit()">
          Cancel
        </button>
      </form>
    </aside>
  
  </div>
